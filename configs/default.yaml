chunk_size: 50000
max_workers: 20
high_confidence_threshold: 70
review_threshold: 40
fallback_to_a_record: true
invalid_if_disposable: true
dns_timeout_seconds: 4.0
retry_dns_times: 1
export_review_bucket: true
keep_original_columns: true
log_level: INFO
staging_db_name: staging.sqlite3
temp_dir_name: temp

# Conservative, non-destructive domain typo *suggestion* engine.
# In the default "suggest_only" mode the pipeline never rewrites an email
# or its domain: it only populates the new typo_detected / suggested_*
# columns and routes candidate rows to the REVIEW bucket. The future
# "auto_apply_safe" mode (not yet enabled) is a placeholder for an opt-in
# rollout where validated suggestions could be applied automatically.
#
# Rules:
#   * Only domains in `whitelist` are ever proposed as a suggestion.
#   * Candidates must be within `max_edit_distance` of the original.
#   * When `require_original_no_mx` is true (default) a suggestion is
#     suppressed post-DNS if the original domain has a valid MX record,
#     so live domains are never "corrected" on top of real data.
typo_correction:
  mode: "suggest_only"
  max_edit_distance: 2
  whitelist:
    - gmail.com
    - yahoo.com
    - outlook.com
    - hotmail.com
    - icloud.com
  require_original_no_mx: true

# V2 Domain Historical Memory.
# Purely additive: reads outputs after a run finishes, upserts per-domain
# counts into a local SQLite, writes domain_history_summary.csv, and
# (optionally) computes a conservative confidence adjustment that is
# recorded but NOT yet fed back into scoring.
history:
  enabled: true
  backend: sqlite
  sqlite_path: runtime/history/domain_history.sqlite
  # Phase 2: light-adjustment ON, bucket flips OFF by default.
  # With flips off, history only annotates the CSVs (score_post_history,
  # historical_label, human_reason, etc.); V1 placement on disk is untouched.
  apply_light_confidence_adjustment: true
  max_positive_adjustment: 3
  max_negative_adjustment: 5
  min_observations_for_labeling: 5
  min_observations_for_adjustment: 5
  allow_bucket_flip_from_history: false
  write_summary_report: true
  write_adjustment_report: true

# V2 Phase 4 + V2.2: SMTP probing.
#
# V2.2 promotes SMTP from a sample-driven post-pass to an in-chunk
# verification stage that runs before the V2 DecisionStage. Production
# defaults are now ``enabled: true`` and ``dry_run: false`` so live
# deliverability evidence reaches the decision layer.
#
# Test safety: ``conftest.py`` installs an autouse fixture that monkey-
# patches the live ``probe_email_smtplib`` to a deterministic stub so
# the test suite never opens a real socket, regardless of the values
# below. To enable live probing in production, leave these defaults
# unchanged; deployments that want to run dry can flip ``dry_run`` to
# ``true``.
#
# ``sample_size`` and ``max_per_domain`` remain the contract for the
# legacy post-pass orchestrator (``app.validation_v2.smtp_integration``)
# which still reads them. The chunk-time stage uses
# ``max_candidates_per_run`` (omit / null = no cap).
smtp_probe:
  enabled: true
  dry_run: false
  max_candidates_per_run: null
  timeout_seconds: 10
  rate_limit_per_second: 2.0
  retries: 0
  retry_temp_failures: true
  max_retries: 1
  sender_address: trashpanda-probe@localhost
  # Legacy knobs read by the post-pass orchestrator.
  sample_size: 50
  max_per_domain: 3
  negative_adjustment_trigger_threshold: 3

# V2.7 — Feedback Loop / Bounce Outcome Ingestion.
#
# Closes the learning loop: real campaign outcomes (delivered,
# hard/soft bounce, blocked, deferred, complaint, unsubscribed)
# ingested via ``app.api_boundary.ingest_bounce_feedback`` and
# persisted to a dedicated SQLite store. The chunk-time pipeline does
# NOT depend on this data — ingestion is an out-of-band operator job.
#
# ``store_path`` is resolved relative to the project root. The four
# rate fields tune ``compute_risk_level`` thresholds used by future
# domain-intelligence integration.
bounce_ingestion:
  enabled: true
  store_path: runtime/feedback/bounce_outcomes.sqlite
  min_observations_for_domain_reputation: 5
  medium_hard_bounce_rate: 0.08
  high_hard_bounce_rate: 0.20
  high_blocked_rate: 0.10
  complaint_is_high_risk: true

# V2.6 — Domain Intelligence & Cold-start handling.
#
# Heuristic-driven domain classification that runs at chunk time
# between catch-all detection and the V2 decision. Promotes domain
# risk and cold-start handling into first-class row-level fields:
# ``domain_intel_status``, ``domain_reputation_score``,
# ``domain_risk_level``, ``domain_behavior_class``,
# ``domain_observation_count``, ``domain_cold_start``,
# ``domain_intel_reason``.
#
# The chunk-time stage uses heuristics only (free-provider whitelist,
# disposable list, suspicious-shape detection); it never opens a
# socket. The architectural seam for full history-driven
# classification stays clean — callers can pre-populate
# ``context.extras["domain_intel_cache"]`` and the stage will prefer
# cached entries over the heuristic.
#
# Decision integration (centralized in app.v2_decision_policy):
#   * ``domain_risk_level=high``  caps approval at manual_review.
#   * ``domain_cold_start AND smtp_status != valid`` caps approval.
domain_intelligence:
  enabled: true
  min_observations_for_reputation: 3
  cold_start_default_risk: unknown
  high_risk_blocks_auto_approve: true
  cold_start_requires_smtp_valid: true

# V2.3 — Catch-all detection.
#
# Promotes catch-all detection from "annotation surfaced inside SMTP
# result" to a first-class row-level decision signal. The chunk-time
# stage relies on the random-RCPT signal already produced by the
# upstream SMTP probe (no new probing here); set ``enabled: false`` to
# fall back to legacy V2.2 behaviour where ``smtp_status=catch_all_possible``
# alone caps approval (the new canonical columns will still be emitted
# with ``catch_all_status=not_tested``).
catch_all:
  enabled: true
  method: smtp
  cache_by_domain: true
  default_on_unknown: review

# V2 Phase 5: probabilistic deliverability model.
# Collapses Phase 1-4 signals into one probability in [0, 1] per row
# plus a high/medium/low label. Purely informational — bucket placement
# is never altered by this stage.
probability:
  enabled: true
  # Additive model v2: 0.80 / 0.50 align with the decision engine
  # thresholds so 'high' and 'auto_approve' describe the same cohort.
  high_threshold: 0.80
  medium_threshold: 0.50
  write_summary_report: true

# V2 Phase 6: Decision Engine (automated actions layer).
# Converts deliverability_probability into one of three actions:
# auto_approve (>= 0.80), manual_review (>= 0.50), auto_reject.
#
# V2.1 — bucket override is now ON by default. The Decision Engine is
# the production authority for clean / review / invalid placement; V1
# scoring is retained as a structural pre-filter and as observability,
# but ``preliminary_bucket=high_confidence`` alone no longer routes a
# row to the clean export. Set ``enable_bucket_override: false`` only
# to fall back to the legacy V1-authoritative routing for diagnostics.
decision:
  enabled: true
  approve_threshold: 0.80
  review_threshold: 0.50
  enable_bucket_override: true
  write_summary_report: true
